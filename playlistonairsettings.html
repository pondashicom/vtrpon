<!-- playlistonairsettings.html 2.6.1 -->

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Playlist / Onair Settings</title>
    <link rel="stylesheet" href="modal-common.css">
</head>
<body>
    <div class="container">
        <h3 id="playlistSectionTitle">PLAYLIST</h3>

        <div class="settings-check-row">
            <input type="checkbox" id="preferAudioAlbumArt">
            <label id="preferAudioAlbumArtLabel" for="preferAudioAlbumArt">Prefer album art for audio thumbnails</label>
        </div>

        <div class="settings-check-row">
            <input type="checkbox" id="autoSelectNextAfterOffAir">
            <label id="autoSelectNextAfterOffAirLabel" for="autoSelectNextAfterOffAir">Auto-select next item after Off-Air</label>
        </div>

        <div class="settings-check-row">
            <label id="clockSizeLabel" for="clockSizeValue">Clock Size</label>
            <button type="button" id="clockSizeIncrease">+</button>
            <button type="button" id="clockSizeDecrease">-</button>
            <span id="clockSizeValue">1.0x</span>
        </div>

        <h3 id="onairSectionTitle">ONAIR</h3>

        <div class="settings-check-row">
            <label id="ftbButtonFadeSecLabel" for="ftbButtonFadeSec">FTB button fade duration</label>
            <input type="number" id="ftbButtonFadeSec" min="0" step="0.1" value="1" class="inline-rate-input" aria-label="FTB Fade Duration">
        </div>

        <div class="settings-check-row">
            <input type="checkbox" id="disableFtbButton">
            <label id="disableFtbButtonLabel" for="disableFtbButton">Disable FTB button</label>
        </div>
    </div>

    <div class="settings-check-row settings-check-row-center">
        <input type="checkbox" id="restoreOnStartup">
        <label id="restoreOnStartupLabel" for="restoreOnStartup">Restore on next startup</label>
    </div>

    <div class="modal-button-row">
        <button id="okButton">OK</button>
    </div>

    <script src="labels.js"></script>
    <script src="playlistonairsettings.js"></script>
</body>
</html>
